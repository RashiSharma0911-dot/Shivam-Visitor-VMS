name: Build Android APK

on:
  push:
    branches: ["*"]
  workflow_dispatch: {}

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Static Site
        run: |
          # Temporarily move API folder if it exists
          if [ -d "src/app/api" ]; then mv src/app/api src/app/_api_temp; fi
          npm run build
          # Move it back for code integrity
          if [ -d "src/app/_api_temp" ]; then mv src/app/_api_temp src/app/api; fi

      - name: Sync with Capacitor
        run: npx cap sync android

      - name: Build Android Project
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
